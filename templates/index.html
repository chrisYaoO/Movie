<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Form</title>
</head>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


<div class="page">

    <body>
        <div class="app">
            <div class="card">
                <h1>Movies</h1>


                <div class="form-group">
                    <label for="date">Date: </label>
                    <input type="date" id="date" />
                </div>

                <div class="form-group">
                    <label for="URL">Movie URL: </label>
                    <input type="text" id="URL" name="URL" />
                    <button class="action" id="parseBtn">Parse</button>

                </div>

                <div class="movieInfo" id="movieInfo" style="display: none;">
                    <div class="info">
                        <label for="name">Name: </label>
                        <span id="name"></span>
                    </div>

                    <div class="info">
                        <label for="director">Director: </label>
                        <span id="director"></span>
                    </div>

                    <div class="info">
                        <label for="year">Year: </label>
                        <span id="year"></span>
                    </div>

                </div>

                <div class="form-group">
                    <label for="quality">Quality:</label>
                    <!-- <input type="text" id="Quality" name="Quality" /> -->
                    <select name="quality_selection" id="quality">
                        <option value="1080p">1080p</option>
                        <option value="4K">4K</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group" id="otherInput" style="display: none;">
                    <label for="other">Other: </label>
                    <input type="text" id="other">
                </div>

                <div class="form-group">
                    <label for="rating">Rating:</label>
                    <input type="number" id="rating" min="0" max="5" step="0.1" />
                </div>

                <div class="form-group">
                    <label for="comments">Comment:</label> <br>
                    <textarea id="comments" cols="70" rows="20"></textarea>
                </div>

                <button class="action" type="button" id="submitBtn">Submit</button>

                <div class="message" id="message"></div>
                <pre id="result"></pre>

                <script src="{{ url_for('static', filename='app.js') }}"></script>
            </div>
        </div>

    </body>

</div>

</html>
