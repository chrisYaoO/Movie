<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
</head>

<body style="margin: 0; padding: 0; font-family: sans-serif; background-color: rgb(255, 255, 255);">
    {% for item in items %}

    <section
        style="box-sizing: border-box; margin-bottom: 24px; padding-bottom: 22px; border-bottom: 1px dashed rgb(217, 208, 194);">

        {% if item.image_url %}
        <section style="box-sizing: border-box; margin-bottom: 14px; line-height: 0;">
            <img src="{{ item.image_url }}" alt="poster"
                style="display: block; width: 100%; height: auto; box-sizing: border-box;">
        </section>
        {% endif %}

        <section
            style="display: flex; flex-flow: row; justify-content: flex-start; align-items: center; box-sizing: border-box;">

            <section
                style="display: inline-block; vertical-align: top; width: 60px; flex: 0 0 auto; box-sizing: border-box;">
                <section
                    style="width: 60px; height: 60px; background-color: rgb(209, 193, 66); border-radius: 8px; text-align: center; line-height: 60px; box-sizing: border-box;">
                    <span
                        style="font-size: 20px; font-weight: bold; color: rgb(106, 121, 137); box-sizing: border-box;">{{
                        item.rating }}</span>
                </section>
            </section>

            <section
                style="display: flex; flex-direction: column; justify-content: space-between; height: 60px; padding-left: 15px; flex: 1 1 0%; min-width: 0; box-sizing: border-box;">

                <section
                    style="font-size: 22px; color: rgb(242, 109, 34); box-sizing: border-box; display: flex; align-items: baseline; flex-wrap: wrap;">
                    <strong style="box-sizing: border-box; line-height: 1.1;">{{ item.name }}</strong>
                    {% if item.subname %}
                    <span
                        style="font-size: 15px; margin-left: 10px; font-weight: normal; box-sizing: border-box; line-height: 1.1;">{{
                        item.subname }}</span>
                    {% endif %}
                </section>

                <section
                    style="border-bottom: 1px solid rgb(217, 208, 194); width: 100%; height: 1px; box-sizing: border-box;">
                </section>

                <section style="color: rgb(106, 121, 137); font-size: 15px; box-sizing: border-box;">
                    <p style="margin: 0px; padding: 0px; box-sizing: border-box; line-height: 1.1;">
                        <span style="margin-right: 15px; box-sizing: border-box;">{{ item.director }}</span>
                        <span style="box-sizing: border-box;">{{ item.year }}</span>
                    </p>
                </section>

            </section>
        </section>

        <section
            style="color: rgb(61, 61, 61); font-size: 15px; line-height: 1.8; margin-top: 14px; text-align: justify; box-sizing: border-box;">
            <p style="margin: 0px; padding: 0px; text-indent: 2em; word-break: break-word; box-sizing: border-box;">
                <span style="box-sizing: border-box;">{{ item.comment }}</span>
            </p>
        </section>

    </section>
    {% endfor %}
</body>

</html>
