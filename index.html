<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Form</title>
</head>

<body>
    <h1>Movies</h1>

    <div>
        <label for="date">Date: </label>
        <input type="date" id="date" />
    </div>

    <div>
        <label for="URL">Movie URL: </label>
        <input type="text" id="URL" name="URL" />
        <button id="parseBtn">Parse</button>

    </div>

    <div id="movieInfo" style="display: none;">
        <div>
            <label for="name">Name: </label>
            <span id="name"></span>
        </div>

        <div>
            <label for="director">Director: </label>
            <span id="director"></span>
        </div>

        <div>
            <label for="year">Year: </label>
            <span id="year"></span>
        </div>

    </div>

    <div>
        <label for="quality">Quality:</label>
        <!-- <input type="text" id="Quality" name="Quality" /> -->
        <select name="quality_selection" id="quality">
            <option value="1080p">1080p</option>
            <option value="4K">4K</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div id="otherInput" style="display: none;">
        <label for="other">Other: </label>
        <input type="text" id="other">
    </div>

    <div>
        <label for="rating">Rating:</label>
        <input type="number" id="rating" min="0" max="5" step="0.1" />
    </div>

    <div>
        <label for="comments">Comments:</label> <br>
        <textarea id="comments" cols="30" rows="10"></textarea>
    </div>

    <button type="button" id="submitBtn">Submit</button>

    <div id="message" style="margin-top: 16px; color: #1f2937;"></div>
    <pre id="result"
        style="margin-top: 12px; padding: 12px; background: #f3f4f6; border-radius: 8px; display: none;"></pre>

    <script src="app.js"></script>
</body>

</html>
